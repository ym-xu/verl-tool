# DocSeek Data Pipeline Configuration
# All paths are relative to data_root unless absolute.

data_root: "/data/151-1/users/yiming/dococr_data"

sources:
  paper_visa:
    enabled: true
    image_dir: "${data_root}/train_source/VISA/paper_visa_image"
    # QA loaded from HuggingFace (MrLight/paper-visa) — images matched by filename
    hf_path: "MrLight/paper-visa"
    split: "train"
    max_samples: null
    tasks: ["vqa"]
    # Hard case filter (pass@8)
    scores_file: "${data_root}/pipeline/scores/Qwen3-VL-8B-Instruct/paper_visa_scores_v2.jsonl"
    filter_pass_rate: true   # only keep pass_rate < 1.0

  wiki_visa:
    enabled: true
    image_dir: "${data_root}/train_source/VISA/wiki_visa_image"
    hf_path: "MrLight/wiki-visa"
    split: "train"
    max_samples: null
    tasks: ["vqa"]
    scores_file: "${data_root}/pipeline/scores/Qwen3-VL-8B-Instruct/wiki_visa_scores_v2.jsonl"
    filter_pass_rate: true

  docvqa:
    enabled: true
    image_dir: "${data_root}/train_source/DocVQA/docvqa_image"
    qa_file: "${data_root}/train_source/DocVQA/spdocvqa_qas/train_v1.0_withQT.json"
    max_samples: null
    tasks: ["vqa"]
    scores_file: "${data_root}/pipeline/scores/Qwen3-VL-8B-Instruct/vqa_scores.jsonl"
    scores_id_prefix: "docvqa_train"  # filter scores by id prefix
    filter_pass_rate: true

  infovqa:
    enabled: true
    image_dir: "${data_root}/train_source/InfographicsVQA/images"
    qa_file: "${data_root}/train_source/InfographicsVQA/infographicsVQA_train_v1.0.json"
    max_samples: null
    tasks: ["vqa"]
    scores_file: "${data_root}/pipeline/scores/Qwen3-VL-8B-Instruct/vqa_scores.jsonl"
    scores_id_prefix: "infovqa_train"
    filter_pass_rate: true

  mineru_gnd_ocr:
    enabled: true
    mineru_dirs:
      docvqa: "${data_root}/intermediate/mineru_output"
      infovqa: "${data_root}/intermediate/mineru_infovqa"
    image_dirs:
      docvqa: "${data_root}/train_source/DocVQA/docvqa_image"
      infovqa: "${data_root}/train_source/InfographicsVQA/images"
    tasks: ["gnd", "ocr"]

# Task ratio in final dataset
task_ratio:
  vqa: 0.6
  gnd: 0.25
  ocr: 0.15

# VQA source ratio (within VQA portion)
vqa_source_ratio:
  paper_visa: 0.4
  wiki_visa: 0.3
  docvqa: 0.15
  infovqa: 0.15

# Rule-based filters for MinerU GND/OCR data
filters:
  min_text_length: 3
  max_text_length: 200
  # Remove elements with very short garbled text
  min_word_count: 1
  # Element types to include (from MinerU output)
  gnd_element_types: ["text", "table", "image", "equation"]
  ocr_element_types: ["text", "equation"]
  # Only text_level=1 (titles/headings) for GND by default; null = all levels
  # Bbox area filters (ratio of element area to full image area)
  min_bbox_area_ratio: 0.001
  max_bbox_area_ratio: 0.5
  # Skip 'discarded' type
  skip_types: ["discarded"]

# Image resolution control
# max_pixels controls the maximum pixels for model input.
# 512*28*28 = 401408 (~400K pixels): good balance for document understanding.
# Must be consistent across: training, evaluation, and any filtering.
image:
  max_pixels: 401408   # 512*28*28
  min_pixels: 3136     # 4*28*28

# Output settings
output:
  dir: "data/docseek"
  val_size: 100
  seed: 42
  version: "v1"
