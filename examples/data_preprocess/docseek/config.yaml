# DocSeek Data Pipeline Configuration
# All paths are relative to data_root unless absolute.

data_root: "/data/151-1/users/yiming/dococr_data"

sources:
  paper_visa:
    enabled: true
    qa_file: "${data_root}/pipeline/formatted/visa_paper_train.jsonl"
    data_root: "${data_root}"
    max_samples: null
    tasks: ["vqa"]   # VQA only, no evidence GND
    scores_file: "${data_root}/pipeline/scores/Qwen3-VL-8B-Instruct/paper_visa_scores_v2.jsonl"
    filter_pass_rate: true

  wiki_visa:
    enabled: true
    qa_file: "${data_root}/pipeline/formatted/visa_wiki_train.jsonl"
    data_root: "${data_root}"
    max_samples: null
    tasks: ["vqa"]   # VQA only
    scores_file: "${data_root}/pipeline/scores/Qwen3-VL-8B-Instruct/wiki_visa_scores_v2.jsonl"
    filter_pass_rate: true

  docvqa:
    enabled: true
    image_dir: "${data_root}/train_source/DocVQA/docvqa_image"
    qa_file: "${data_root}/train_source/DocVQA/spdocvqa_qas/train_v1.0_withQT.json"
    max_samples: null
    tasks: ["vqa"]
    scores_file: "${data_root}/pipeline/scores/Qwen3-VL-8B-Instruct/vqa_scores.jsonl"
    scores_id_prefix: "docvqa_train"
    filter_pass_rate: true

  infovqa:
    enabled: true
    image_dir: "${data_root}/train_source/InfographicsVQA/images"
    qa_file: "${data_root}/train_source/InfographicsVQA/infographicsVQA_train_v1.0.json"
    max_samples: null
    tasks: ["vqa"]
    scores_file: "${data_root}/pipeline/scores/Qwen3-VL-8B-Instruct/vqa_scores.jsonl"
    scores_id_prefix: "infovqa_train"
    filter_pass_rate: true

  mineru_gnd_ocr:
    enabled: true
    mineru_dirs:
      docvqa: "${data_root}/intermediate/mineru_output"
      infovqa: "${data_root}/intermediate/mineru_infovqa"
      paper_visa: "${data_root}/intermediate/mineru_visa_paper"
    image_dirs:
      docvqa: "${data_root}/train_source/DocVQA/docvqa_image"
      infovqa: "${data_root}/train_source/InfographicsVQA/images"
      paper_visa: "${data_root}/train_source/VISA/paper_visa_image"
    tasks: ["gnd", "ocr"]
    filter_pass_rate: false
    gnd_scores_file: null
    ocr_scores_file: null
    # Per-source rules: InfoVQA only text OCR, no table/image GND (irregular infographics)
    source_rules:
      infovqa:
        gnd_types: []           # no GND for infographics
        ocr_types: ["text"]     # text OCR only
      docvqa:
        gnd_types: ["table", "image", "equation"]
        ocr_types: ["text", "equation"]
      paper_visa:
        gnd_types: ["table", "image", "equation"]
        ocr_types: ["text", "equation"]

# Task ratio in final dataset
task_ratio:
  vqa: 0.6
  gnd: 0.25
  ocr: 0.15

# VQA source ratio (within VQA portion)
vqa_source_ratio:
  paper_visa: 0.4
  wiki_visa: 0.3
  docvqa: 0.15
  infovqa: 0.15

# Image resolution control
# 512*28*28 = 401408 (~400K pixels): good balance for document understanding.
# Must be consistent across: training, evaluation, and any filtering.
image:
  max_pixels: 401408   # 512*28*28
  min_pixels: 3136     # 4*28*28

# Output settings
output:
  dir: "data/docseek"
  val_size: 100
  seed: 42
  version: "v2"
